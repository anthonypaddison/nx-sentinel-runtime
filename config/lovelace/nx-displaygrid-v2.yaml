title: nx-displaygrid v2
views:
    - title: nx-displaygrid v2
      path: nx-displaygrid-v2
      icon: mdi:calendar-star
      panel: true

      cards:
          - type: custom:nx-displaygrid
            title: nx-displaygrid v2
            debug: false

            # V2 feature flags (kept off in the original dashboard)
            v2_features:
                important_shopping_count_header: true
                chores_metadata_badges: true
                persist_date_context: true
                home_controls_broader_entities: true
                food_view: true
                person_wizard_settings: true
                event_details_extended: true
                intent_view: true
                ambient_view: true
                adaptive_layout: true
                dynamic_themes: true
                reminder_banners: true
                notification_policy: true
                family_dashboard: true
                admin_dashboard: true
                audit_timeline: true

            adaptive_v2:
                auto_screen: true
                auto_screen_idle_seconds: 180
                dynamic_theme: true
                occupancy_entity: ''
                confidence_entity: ''
                confidence_uncertain_below: 70

            intent_v2:
                house_mode_entity: ''

            notifications_v2:
                suppress_when_visible: true

            admin_v2:
                backup_last_success_entity: ''
                backup_stale_hours: 48
                snapshot_service: ''

            health_v2:
                window_entities: []
                heating_entities: []
                lights_watch_entities: []
                device_watch_entities: []

            audit_v2:
                enabled: true
                max_entries: 400
                default_days: 7

            house_modes_v2:
                - id: home
                  label: Home
                - id: away
                  label: Away
                - id: away_off
                  label: Away/Off
                - id: guest
                  label: Guest
                - id: quiet
                  label: Quiet
                - id: calm
                  label: Calm

            # Layout tuning
            day_start_hour: 6
            day_end_hour: 22
            slot_minutes: 30
            px_per_hour: 120
            refresh_interval_ms: 300000

            # People palette
            people:
                - id: person_one
                  name: Person One
                  color: '#36B37E'
                  header_row: 1
                - id: person_two
                  name: Person Two
                  color: '#7E57C2'
                  header_row: 1
                - id: person_three
                  name: Person Three
                  color: '#F4B400'
                  header_row: 2

            calendars:
                - entity: calendar.person_one
                  person_id: person_one
                - entity: calendar.person_two
                  person_id: person_two
                - entity: calendar.family
                  person_id: person_one
                  role: family
                - entity: calendar.routine
                  person_id: person_one
                  role: routine

            todos:
                - entity: todo.person_one
                  name: Person One
                  person_id: person_one
                - entity: todo.person_two
                  name: Person Two
                  person_id: person_two

            shopping:
                entity: todo.shopping_list_2
                name: Shopping

            # Home controls: entities shown on Home Controls screen
            home_controls: !include ../includes/home_controls.yaml
