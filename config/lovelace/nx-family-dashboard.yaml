title: NX - Family Dashboard
views:
    - title: NX - Family Dashboard
      path: nx-family-dashboard
      icon: mdi:account-group
      panel: true

      cards:
          - type: custom:nx-displaygrid
            title: NX - Family Dashboard
            debug: false

            v2_features:
                important_shopping_count_header: true
                chores_metadata_badges: true
                persist_date_context: true
                home_controls_broader_entities: true
                food_view: true
                person_wizard_settings: true
                event_details_extended: true
                intent_view: false
                ambient_view: true
                adaptive_layout: true
                dynamic_themes: true
                reminder_banners: true
                notification_policy: true
                family_dashboard: true
                admin_dashboard: true
                audit_timeline: true

            family_dashboard_v3:
                enabled: true
                focus_landscape: true
                admin_menu:
                    settings: true
                    admin: true
                    audit: true
                home_control_collections:
                    - id: heating
                      label: Heating
                      icon: mdi:radiator
                      domains:
                          - climate
                          - switch
                          - input_boolean
                      name_contains:
                          - heat
                          - heating
                          - radiator
                          - boiler
                          - thermostat
                    - id: lighting
                      label: Lighting
                      icon: mdi:lightbulb-group
                      domains:
                          - light
                          - switch
                      name_contains:
                          - light
                          - lamp
                          - porch
                          - hallway

            adaptive_v2:
                auto_screen: true
                auto_screen_idle_seconds: 180
                dynamic_theme: true
                occupancy_entity: ''
                confidence_entity: ''
                confidence_uncertain_below: 70

            intent_v2:
                house_mode_entity: ''

            notifications_v2:
                suppress_when_visible: true

            admin_v2:
                backup_last_success_entity: ''
                backup_stale_hours: 48
                snapshot_service: ''

            health_v2:
                window_entities: []
                heating_entities: []
                lights_watch_entities: []
                device_watch_entities: []

            audit_v2:
                enabled: true
                max_entries: 400
                default_days: 7

            house_modes_v2:
                - id: home
                  label: Home
                - id: away
                  label: Away
                - id: away_off
                  label: Away/Off
                - id: guest
                  label: Guest
                - id: quiet
                  label: Quiet
                - id: calm
                  label: Calm

            food_v2:
                units:
                    - grams
                    - oz
                    - kg
                    - breasts
                    - legs
                    - ml
                    - l
                    - items

            day_start_hour: 6
            day_end_hour: 22
            slot_minutes: 30
            px_per_hour: 120
            refresh_interval_ms: 300000

            people: !include ../includes/nx_displaygrid_people.yaml

            calendars: !include ../includes/nx_displaygrid_calendars.yaml

            todos: !include ../includes/nx_displaygrid_todos.yaml

            shopping: !include ../includes/nx_displaygrid_shopping.yaml

            home_controls: !include ../includes/home_controls.yaml
